<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sii YOU - Big Image Heart</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #120305;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* ១. កន្លែងកែទំហំរូបថតកណ្តាល (បានពង្រីកពី 110px ទៅ 160px) */
        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px;  /* ចង់ឱ្យរូបធំជាងនេះ អាចដូរលេខត្រង់នេះ */
            height: 160px; /* ចង់ឱ្យរូបធំជាងនេះ អាចដូរលេខត្រង់នេះ */
            border: 4px solid #ff3344;
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 0 30px #ff3344;
            overflow: hidden; /* កាត់រូបភាពឱ្យចេញជារង្វង់មូល */
            background-color: #444;
        }

        .center-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* ឱ្យរូបភាពរត់ពេញរង្វង់ស្អាត */
        }

        /* ២. ពង្រីកអក្សររត់ជុំវិញឱ្យត្រូវនឹងទំហំរូបថត (ពី 220px ទៅ 280px) */
        .text-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 280px; 
            height: 280px;
            transform: translate(-50%, -50%);
            z-index: 5;
            animation: rotateRing 15s linear infinite;
        }

        .text-ring svg {
            width: 100%;
            height: 100%;
        }

        .text-ring text {
            fill: #ff4d6d;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 6px;
            text-shadow: 0 0 8px rgba(255, 77, 109, 0.8);
        }

        @keyframes rotateRing {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="center-circle">
        <img src="c:\Users\Administrator\Downloads\picgang\SiiYou.jpg" alt="Sii YOU">
    </div>
    
    <div class="text-ring">
        <svg viewBox="0 0 200 200">
            <path id="textPath" d="M 100, 100 m -82, 0 a 82,82 0 1,1 164,0 a 82,82 0 1,1 -164,0" fill="none"/>
            <text>
                <textPath href="#textPath" startOffset="0%">
                    • Sii YOU • Sii YOU • Sii YOU • Sii YOU
                </textPath>
            </text>
        </svg>
    </div>

    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        const targetName = "Sii YOU"; 
        const particles = [];
        const textParticles = [];

        function heartPosition(t) {
            return {
                x: 20 * Math.pow(Math.sin(t), 3),
                y: -(15 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
            };
        }

        // គ្រាប់ពន្លឺខ្សែបេះដូង (ពង្រីកឱ្យធំស្រឡះទូលាយជុំវិញរូបភាព)
        class Particle {
            constructor() {
                this.t = Math.random() * Math.PI * 2;
                const pos = heartPosition(this.t);
                
                const scale = 26; 
                this.targetX = canvas.width / 2 + pos.x * scale;
                this.targetY = canvas.height / 2 + pos.y * scale;
                
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.speed = 0.01 + Math.random() * 0.02;
                this.size = Math.random() * 2.5 + 1;this.alpha = Math.random();
            }

            update() {
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
                this.alpha += (Math.random() - 0.5) * 0.1;
                if(this.alpha < 0) this.alpha = 0;
                if(this.alpha > 1) this.alpha = 1;
            }

            draw() {
                ctx.fillStyle = "rgba(255, 220, 220, " + this.alpha + ")";
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ឈ្មោះ Sii YOU ហោះរាយប៉ាយពេញអេក្រង់
        class TextParticle {
            constructor() {
                this.reset();
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
            }

            reset() {
                this.t = Math.random() * Math.PI * 2;
                const pos = heartPosition(this.t);
                
                const spread = 22 + Math.random() * 35; 
                this.targetX = canvas.width / 2 + pos.x * spread;
                this.targetY = canvas.height / 2 + pos.y * spread;
                
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 1.5;
                this.alpha = 0;
                this.maxAlpha = 0.5 + Math.random() * 0.4;
                this.fadeSpeed = 0.003 + Math.random() * 0.006;
                this.phase = 'fadeIn';
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                this.x += (this.targetX - this.x) * 0.008;
                this.y += (this.targetY - this.y) * 0.008;

                if (this.phase === 'fadeIn') {
                    this.alpha += this.fadeSpeed;
                    if (this.alpha >= this.maxAlpha) this.phase = 'fadeOut';
                } else {
                    this.alpha -= this.fadeSpeed;
                    if (this.alpha <= 0) this.reset();
                }
            }

            draw() {
                ctx.fillStyle = "rgba(255, 30, 60, " + this.alpha + ")";
                ctx.font = "bold 14px sans-serif";
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#ff1e3c';
                ctx.fillText(targetName, this.x, this.y);
                ctx.shadowBlur = 0; 
            }
        }

        for (let i = 0; i < 600; i++) {
            particles.push(new Particle());
        }
        for (let i = 0; i < 55; i++) {
            textParticles.push(new TextParticle());
        }

        function animate() {
            ctx.fillStyle = 'rgba(18, 3, 5, 0.25)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            textParticles.forEach(tp => {
                tp.update();
                tp.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
